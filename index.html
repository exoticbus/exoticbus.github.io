<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scorechecker</title>
  <link rel="stylesheet" href="mini.css" />
</head>
<body>
  <header>
    <h1>admin</h1>
    <p>Type your student's score and see if they've passed..</p>
  </header>

  <main>
    <section>
      <input type="number" id="scoreInput" placeholder="Enter score (0-100)" />
      <button id="checkBtn">Check Score</button>
      <p id="result"></p>
    </section>
  </main>

  <footer>
    <p>Administration Only!</p>
  </footer>

  <script src="mini.js"></script>
</body>
</html>
